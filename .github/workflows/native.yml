name: Native executables

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'pom.xml'
      - 'src/**'
      - 'frontend/**'
      - '.github/workflows/native.yml'

permissions:
  contents: read

jobs:
  native:
    name: Native ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: windows-latest
            label: windows-x64
          - os: macos-15-intel
            label: macos-x64
          - os: macos-15
            label: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
          native-image-job-reports: true
      - name: Compile native executable
        if: runner.os != 'Windows'
        run: ./mvnw --batch-mode --no-transfer-progress -Pnative -DskipTests native:compile
      - name: Compile native executable on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\mvnw.cmd --batch-mode --no-transfer-progress -Pnative -DskipTests native:compile
      - name: Stage Unix executable
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          executable=$(find target -maxdepth 1 -type f -name 'trastcms-*' ! -name '*.jar' -perm -111 | head -n 1)
          test -n "$executable"
          cp "$executable" "dist/trastcms-${{ matrix.label }}"
      - name: Stage Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $executable = Get-ChildItem target\trastcms-*.exe | Select-Object -First 1
          if (-not $executable) { throw "Native executable not found" }
          Copy-Item $executable.FullName "dist\trastcms-${{ matrix.label }}.exe"
      - name: Upload native executable
        uses: actions/upload-artifact@v7
        with:
          name: trastcms-${{ matrix.label }}
          path: dist/trastcms-${{ matrix.label }}*
          if-no-files-found: error
          retention-days: 14
