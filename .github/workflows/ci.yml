name: CI

on:
  push:
    branches: [master, main, feat/trastcms-v2-foundation]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test and package JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify backend, frontend and tests
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Upload executable JAR
        uses: actions/upload-artifact@v4
        with:
          name: trastcms-jar
          path: target/trastcms-*.jar
          if-no-files-found: error
          retention-days: 14
