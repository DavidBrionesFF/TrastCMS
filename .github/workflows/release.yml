name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw --batch-mode --no-transfer-progress clean verify
      - name: Publish JAR
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/trastcms-*.jar

  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: windows-latest
            label: windows-x64
          - os: macos-15-intel
            label: macos-x64
          - os: macos-15
            label: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven
      - name: Compile native executable
        if: runner.os != 'Windows'
        run: ./mvnw --batch-mode --no-transfer-progress -Pnative -DskipTests native:compile
      - name: Compile native executable on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\mvnw.cmd --batch-mode --no-transfer-progress -Pnative -DskipTests native:compile
      - name: Stage Unix executable
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          executable=$(find target -maxdepth 1 -type f -name 'trastcms-*' ! -name '*.jar' -perm -111 | head -n 1)
          test -n "$executable"
          cp "$executable" "dist/trastcms-${{ matrix.label }}"
      - name: Stage Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $executable = Get-ChildItem target\trastcms-*.exe | Select-Object -First 1
          if (-not $executable) { throw "Native executable not found" }
          Copy-Item $executable.FullName "dist\trastcms-${{ matrix.label }}.exe"
      - name: Publish native executable
        uses: softprops/action-gh-release@v2
        with:
          files: dist/trastcms-${{ matrix.label }}*
